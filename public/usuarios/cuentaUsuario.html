<!DOCTYPE html>
<html lang="es">
<head>
  <link rel="icon" type="image/png" href="https://zgjaxanqfkweslkxtayt.supabase.co/storage/v1/object/public/findixi/loader.png">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Mi Cuenta</title>
  <script src="https://cdn.tailwindcss.com"></script> <!-- ✅ Este sí funciona -->
  <script> tailwind.config = {theme: {extend: {fontFamily: {sans: ['Kanit', 'sans-serif']}}}}
</script>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@200;300;400;600;700&display=swap" rel="stylesheet">
   <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    .action-card-label {
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      text-align: center;
      width: 100%;
    }
  </style>

</head>
<body class="bg-slate-100">

<div class="min-h-screen flex justify-center px-2 sm:px-4 py-3">
  <div class="w-full max-w-md bg-white text-gray-800 rounded-3xl border border-slate-200 shadow-sm overflow-hidden">

    <!-- Header -->
<div id="headerContainer"></div>
<script type="module" src="../js/header.js"></script>

  <main class="min-h-screen overflow-y-auto pb-20 px-4 py-5 text-center bg-slate-50">
    <section id="perfilUsuario" class="relative rounded-2xl border border-slate-200 bg-white shadow-sm p-4 flex flex-col items-center gap-2">
      <button id="btnMensajes" class="absolute top-3 right-3 inline-flex items-center justify-center w-10 h-10 rounded-full bg-cyan-50 text-cyan-700 hover:bg-cyan-100 border border-cyan-100 shadow-sm">
        <i class="fa-solid fa-message"></i>
        <span id="mensajesBadge" class="hidden absolute -top-1 -right-1 min-w-[18px] h-[18px] px-1 rounded-full bg-red-600 text-white text-[11px] leading-[18px] font-semibold text-center">0</span>
      </button>
      <img id="fotoPerfil" src="https://placehold.co/100x100?text=User" class="w-24 h-24 rounded-full object-cover shadow border border-slate-200">
      <h2 id="nombreUsuario" class="text-xl font-semibold text-slate-900">Nombre Usuario</h2>
      <p id="emailUsuario" class="text-sm text-slate-600">correo@ejemplo.com</p>
      <p id="municipioUsuario" class="text-sm text-slate-600">Municipio</p>
      <p id="fechaRegistro" class="text-xs text-slate-500">Activo desde ...</p>

      <button id="btnEditarPerfil" class="mt-3 inline-flex items-center gap-2 bg-cyan-600 text-white px-4 py-2 rounded-lg text-sm shadow hover:bg-cyan-700">
        <i class="fa-solid fa-pen-to-square"></i>
        Editar perfil
      </button>
    </section>

    <section class="mt-4 text-left rounded-2xl border border-slate-200 bg-white shadow-sm p-4">
      <p class="text-xs font-semibold uppercase tracking-[0.16em] text-slate-500 mb-3">Accesos</p>
      <div class="space-y-2">
        <button id="btnFavoritos" class="w-full rounded-xl border border-slate-200 bg-white px-3 py-3 hover:bg-slate-50 active:scale-[0.99] transition flex items-center justify-between gap-3">
          <span class="inline-flex items-center gap-3 min-w-0">
            <span class="inline-flex items-center justify-center w-9 h-9 rounded-lg bg-sky-100 text-sky-700">
              <i class="fa-solid fa-store"></i>
            </span>
            <span class="text-sm font-medium text-slate-800">Comercios favoritos</span>
          </span>
          <i class="fa-solid fa-chevron-right text-xs text-slate-400"></i>
        </button>

        <button id="btnFavoritosLugares" class="w-full rounded-xl border border-slate-200 bg-white px-3 py-3 hover:bg-slate-50 active:scale-[0.99] transition flex items-center justify-between gap-3">
          <span class="inline-flex items-center gap-3 min-w-0">
            <span class="inline-flex items-center justify-center w-9 h-9 rounded-lg bg-orange-100 text-orange-700">
              <i class="fa-solid fa-location-dot"></i>
            </span>
            <span class="text-sm font-medium text-slate-800">Lugares favoritos</span>
          </span>
          <i class="fa-solid fa-chevron-right text-xs text-slate-400"></i>
        </button>

        <button id="btnFavoritosPlayas" class="w-full rounded-xl border border-slate-200 bg-white px-3 py-3 hover:bg-slate-50 active:scale-[0.99] transition flex items-center justify-between gap-3">
          <span class="inline-flex items-center gap-3 min-w-0">
            <span class="inline-flex items-center justify-center w-9 h-9 rounded-lg bg-cyan-100 text-cyan-700">
              <i class="fa-solid fa-umbrella-beach"></i>
            </span>
            <span class="text-sm font-medium text-slate-800">Playas favoritas</span>
          </span>
          <i class="fa-solid fa-chevron-right text-xs text-slate-400"></i>
        </button>

        <button id="btnPedidos" class="hidden w-full rounded-xl border border-slate-200 bg-white px-3 py-3 hover:bg-slate-50 active:scale-[0.99] transition flex items-center justify-between gap-3">
          <span class="inline-flex items-center gap-3 min-w-0">
            <span class="inline-flex items-center justify-center w-9 h-9 rounded-lg bg-emerald-100 text-emerald-700">
              <i class="fa-solid fa-bag-shopping"></i>
            </span>
            <span class="text-sm font-medium text-slate-800">Mis pedidos</span>
          </span>
          <i class="fa-solid fa-chevron-right text-xs text-slate-400"></i>
        </button>

        <button id="btnCitas" class="hidden w-full rounded-xl border border-slate-200 bg-white px-3 py-3 hover:bg-slate-50 active:scale-[0.99] transition flex items-center justify-between gap-3">
          <span class="inline-flex items-center gap-3 min-w-0">
            <span class="inline-flex items-center justify-center w-9 h-9 rounded-lg bg-cyan-100 text-cyan-700">
              <i class="fa-solid fa-calendar-check"></i>
            </span>
            <span class="text-sm font-medium text-slate-800">Mis citas</span>
          </span>
          <i class="fa-solid fa-chevron-right text-xs text-slate-400"></i>
        </button>
      </div>
    </section>

<button id="btnLogout" class="bg-slate-800 text-white px-4 py-2 rounded-lg text-sm mt-3 w-full hover:bg-slate-900">
  Cerrar sesión
</button>

  </main>

  <!-- Modal Mensajes -->
  <div id="modalMensajes" class="fixed inset-0 bg-black/60 backdrop-blur-sm hidden z-50 items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md p-6 space-y-4">
      <div class="flex items-start justify-between">
        <div>
          <p class="text-xs uppercase tracking-[0.25em] text-gray-500">Mensajes</p>
          <h3 class="text-xl font-semibold text-gray-900">Notificaciones</h3>
        </div>
        <button id="modalMensajesCerrar" class="text-gray-500 hover:text-gray-800">
          <i class="fa-solid fa-xmark text-lg"></i>
        </button>
      </div>
      <div id="mensajesLista" class="space-y-2 max-h-80 overflow-y-auto text-sm text-gray-800">
        <p class="text-gray-500 text-sm" id="mensajesVacio">Sin mensajes.</p>
      </div>
    </div>
  </div>


  <!-- Modal -->
  <div id="modalEditar" class="fixed inset-0 bg-black/50 backdrop-blur-sm hidden z-50 flex items-center justify-center">
  <div class="bg-white rounded-xl p-6 w-11/12 max-w-sm shadow-xl relative">
    <h3 class="text-lg font-bold mb-4">Editar Perfil</h3>
    <form id="formEditarPerfil" class="space-y-4">

      <!-- Nombre y Apellido -->
      <div class="flex gap-2">
        <div class="flex-1">
          <label class="block text-sm font-medium text-gray-600">Nombre</label>
          <input type="text" id="inputNombre" class="w-full border rounded px-3 py-2" required>
        </div>
        <div class="flex-1">
          <label class="block text-sm font-medium text-gray-600">Apellido</label>
          <input type="text" id="inputApellido" class="w-full border rounded px-3 py-2">
        </div>
      </div>

      <!-- Imagen -->
<div>
  <label class="block text-sm font-medium text-gray-600 mb-2">Foto de Perfil</label>
  <div class="flex gap-4 items-center">
    <!-- Imagen actual -->
    <div class="text-center">
      <img id="imagenActual" src="https://placehold.co/80x80?text=User" class="w-20 h-20 rounded-full object-cover border" />
    </div>

    <!-- Imagen nueva (preview) -->
    <div class="text-center">
      <img id="previewFoto" class="w-20 h-20 rounded-full object-cover border hidden" />
    </div>
  </div>

  <!-- Input de archivo -->
  <input type="file" id="inputFoto" accept="image/*" class="w-full mt-2">
</div>

      <!-- Teléfono -->
      <div>
        <label class="block text-sm font-medium text-gray-600">Teléfono</label>
        <input type="tel" id="inputTelefono" class="w-full border rounded px-3 py-2" placeholder="787-555-1234">
      </div>

      <!-- Municipio -->
      <div>
        <label class="block text-sm font-medium text-gray-600">Municipio</label>
        <select id="inputMunicipio" class="w-full border rounded px-3 py-2">
          <option value="">Selecciona un municipio</option>
        </select>
      </div>

      <!-- Botones -->
      <div class="flex justify-end gap-2 mt-4">
        <button type="button" id="btnCancelar" class="text-gray-500 text-sm">Cancelar</button>
        <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm">Guardar</button>
      </div>

    </form>
  </div>
</div>

<script type="module" src="../js/cuentaUsuario.js"></script>


  <!-- Modal Favoritos -->
<div id="modalFavoritos" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
  <div class="bg-white rounded-lg shadow-lg w-[90%] max-w-lg h-[80%] flex flex-col">
    <!-- Header -->
    <div class="flex justify-between items-center p-4 border-b">
      <h2 class="text-xl font-semibold">Mis Comercios Favoritos</h2>
      <button onclick="document.getElementById('modalFavoritos').classList.add('hidden')">✕</button>
    </div>

    <!-- Contenido scrollable -->
    <div class="flex-1 overflow-y-auto p-4">
      <!-- Buscador con lupa -->
      <div class="flex items-center w-full mb-3 border rounded-md shadow-sm overflow-hidden">
        <span class="px-3 text-gray-500">
          <i class="fa-solid fa-magnifying-glass"></i>
        </span>
        <input 
          type="text" 
          id="buscadorFavoritos" 
          placeholder="Buscar comercio..." 
          class="w-full p-2 focus:outline-none focus:ring focus:border-blue-300" />
      </div>

      <!-- Filtros -->
      <div class="flex justify-between gap-2 mb-4">
        <select id="filtroMunicipio" class="w-1/3 p-2 border rounded-md">
          <option value="">Municipio</option>
        </select>
        <select id="filtroCategoria" class="w-1/3 p-2 border rounded-md">
          <option value="">Categoría</option>
        </select>
        <select id="filtroOrden" class="w-1/3 p-2 border rounded-md">
          <option value="alfabetico">Orden alfabético</option>
          <option value="recientes">Recientes</option>
          <option value="cercania">Cercanía</option>
        </select>
      </div>

      <!-- Lista de favoritos -->
      <div id="favoritos-list" class="space-y-3"></div>
      </div>
    <!-- Botón cerrar -->
    <button id="btnCerrarFavoritos" class="absolute top-2 right-2 text-gray-600 hover:text-black">&times;</button>
  </div>
</div>

  <!-- Modal Favoritos Lugares -->
  <div id="modalFavoritosLugares" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
    <div class="bg-white rounded-lg shadow-lg w-[90%] max-w-lg h-[80%] flex flex-col relative">
      <div class="flex justify-between items-center p-4 border-b">
        <h2 class="text-xl font-semibold">Mis Lugares Favoritos</h2>
        <button id="btnCerrarFavoritosLugares" class="text-gray-600 hover:text-black text-xl leading-none">&times;</button>
      </div>

      <div class="flex-1 overflow-y-auto p-4 space-y-4">
        <div class="flex items-center w-full border rounded-md shadow-sm overflow-hidden">
          <span class="px-3 text-gray-500">
            <i class="fa-solid fa-magnifying-glass"></i>
          </span>
          <input
            type="text"
            id="buscadorFavoritosLugares"
            placeholder="Buscar lugar..."
            class="w-full p-2 focus:outline-none focus:ring focus:border-blue-300"
          />
        </div>

        <div class="flex justify-between gap-2">
          <select id="filtroMunicipioLugares" class="w-1/3 p-2 border rounded-md">
            <option value="">Municipio</option>
          </select>
          <select id="filtroCategoriaLugares" class="w-1/3 p-2 border rounded-md">
            <option value="">Categoría</option>
          </select>
          <select id="filtroOrdenLugares" class="w-1/3 p-2 border rounded-md">
            <option value="alfabetico">Orden alfabético</option>
            <option value="recientes">Recientes</option>
            <option value="cercania">Cercanía</option>
          </select>
        </div>

        <div id="favoritos-lugares-list" class="space-y-3"></div>
      </div>
    </div>
  </div>

  <!-- Modal Favoritos Playas -->
  <div id="modalFavoritosPlayas" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
    <div class="bg-white rounded-lg shadow-lg w-[90%] max-w-lg h-[80%] flex flex-col relative">
      <div class="flex justify-between items-center p-4 border-b">
        <h2 class="text-xl font-semibold">Mis Playas Favoritas</h2>
        <button id="btnCerrarFavoritosPlayas" class="text-gray-600 hover:text-black text-xl leading-none">&times;</button>
      </div>

      <div class="flex-1 overflow-y-auto p-4 space-y-4">
        <div class="flex items-center w-full border rounded-md shadow-sm overflow-hidden">
          <span class="px-3 text-gray-500">
            <i class="fa-solid fa-magnifying-glass"></i>
          </span>
          <input
            type="text"
            id="buscadorFavoritosPlayas"
            placeholder="Buscar playa..."
            class="w-full p-2 focus:outline-none focus:ring focus:border-blue-300"
          />
        </div>

        <div class="flex justify-between gap-2">
          <select id="filtroMunicipioPlayas" class="w-1/3 p-2 border rounded-md">
            <option value="">Municipio</option>
          </select>
          <select id="filtroCategoriaPlayas" class="w-1/3 p-2 border rounded-md">
            <option value="">Categoría</option>
          </select>
          <select id="filtroOrdenPlayas" class="w-1/3 p-2 border rounded-md">
            <option value="alfabetico">Orden alfabético</option>
            <option value="recientes">Recientes</option>
            <option value="cercania">Cercanía</option>
          </select>
        </div>

        <div id="favoritos-playas-list" class="space-y-3"></div>
      </div>
    </div>
  </div>


<!-- Footer -->
<div id="footerContainer"></div>
<script type="module" src="../js/footer.js"></script>

  <script src="../js/bloquearPantalla.js"></script>
</div>
</div>
  <script type="module" src="../js/introSplash.js"></script>
  <script type="module" src="../js/betaBanner.js"></script>
</body>
</html>
