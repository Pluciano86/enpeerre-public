<!DOCTYPE html>
<html lang="es">
<head>
  <link rel="icon" type="image/png" href="https://zgjaxanqfkweslkxtayt.supabase.co/storage/v1/object/public/findixi/loader.png">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Perfil de Evento</title>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@200;300;400;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
  <style>
    html,
    body {
      overflow-x: hidden;
      width: 100%;
      max-width: 100vw;
    }
    body {
      font-family: 'Kanit', sans-serif;
    }
  </style>
  <script type="module" src="./js/i18n.js"></script>
</head>
<body class="bg-[#121212]">

<div class="min-h-screen flex justify-center bg-[#121212] overflow-y-auto overflow-x-hidden">
  <div class="w-full max-w-md bg-white text-gray-800 pb-24">

    <div id="headerContainer" class="z-50 relative"></div>
    <script type="module" src="js/header.js"></script>

    <section class="relative">
      <div id="eventoImagenFrame" class="w-full overflow-hidden bg-gray-200 relative" style="aspect-ratio: 7 / 4;">
        <img id="eventoImagenBg" src="" alt="" aria-hidden="true" class="absolute inset-0 w-full h-full object-cover blur-xl scale-110 opacity-0 transition-opacity duration-300" />
        <div class="relative z-10 w-full h-full flex items-center justify-center overflow-hidden">
          <img id="eventoImagen" src="" alt="" class="w-full h-full object-cover opacity-0 transition-opacity duration-300" />
        </div>
      </div>
    </section>

    <section class="px-5 pt-5 pb-2 text-center">
      <h1 id="nombreEvento" class="text-3xl font-semibold text-[#232f43] leading-tight">Evento</h1>
      <p id="categoriaEvento" class="mt-2 text-lg text-orange-500 flex items-center justify-center gap-2"></p>
    </section>

    <section id="encabezadoFechaSection" class="px-4 mt-2">
      <div class="rounded-xl border border-slate-200 bg-slate-50 px-3 py-3">
        <div class="text-center">
          <div id="proximaFechaLabel" class="text-[11px] uppercase tracking-wide text-slate-500 font-semibold mb-1">Próxima fecha</div>
          <div id="fechaPrincipalDia" class="text-red-700 font-semibold text-2xl leading-tight"></div>
          <div id="fechaPrincipalResto" class="text-red-600 text-3xl font-semibold leading-tight"></div>
          <div id="otrasFechasHint" class="hidden text-[10px] leading-none text-gray-400 mt-1"></div>
        </div>
        <div class="mt-3 rounded-lg border border-sky-100 bg-sky-50/70 px-2 py-2">
          <div id="lugarPrincipal" class="text-slate-700 font-semibold text-xl leading-tight text-center"></div>
          <div id="horaPrincipal" class="text-slate-700 font-semibold text-xl leading-tight text-center"></div>
          <div class="mt-1 flex items-center justify-center gap-1 font-medium text-lg" style="color:#23B4E9;">
            <i class="fa-solid fa-map-pin"></i>
            <span id="municipioPrincipal"></span>
          </div>
          <div id="otrosMunicipiosHint" class="hidden text-[10px] leading-none text-gray-400 mt-1 text-center"></div>
        </div>
      </div>
    </section>

    <section class="px-4 mt-4">
      <div class="rounded-xl border border-slate-200 bg-slate-50 px-4 py-3">
        <h2 class="text-center text-lg font-semibold text-[#232f43]">Boletos</h2>
        <p id="boletosPrecio" class="text-center text-xl font-semibold text-green-600 mt-1"></p>
        <p id="boletosResumen" class="text-center text-sm text-slate-700 mt-1">disponibles en</p>
        <div id="boletosLinks" class="mt-3 flex flex-wrap justify-center gap-2"></div>
      </div>
    </section>

    <section id="lugarEventoSection" class="px-4 mt-3">
      <div class="rounded-xl border border-slate-200 bg-white px-4 py-3">
        <div class="flex items-center justify-center gap-2 text-[#23B4E9] font-semibold text-lg leading-tight text-center">
          <i class="fa-solid fa-location-dot"></i>
          <span id="lugarEventoTexto"></span>
        </div>
        <p id="direccionEventoTexto" class="hidden text-center text-sm text-slate-500 mt-1"></p>
        <p id="tiempoVehiculoEvento" class="hidden text-center text-[#9c9c9c] text-lg font-medium mt-2">
          <i class="fas fa-car"></i>
          <span>Cargando distancia...</span>
        </p>
        <div class="flex justify-center gap-4 mt-3">
          <a id="btnEventoGoogleMaps" href="#" target="_blank" rel="noopener noreferrer">
            <img src="https://zgjaxanqfkweslkxtayt.supabase.co/storage/v1/object/public/galeriacomercios/google%20map.jpg"
                 alt="Google Maps" class="shadow-[0px_9px_12px_-7px_rgba(0,_0,_0,_0.3)] rounded-full h-10">
          </a>
          <a id="btnEventoWaze" href="#" target="_blank" rel="noopener noreferrer">
            <img src="https://zgjaxanqfkweslkxtayt.supabase.co/storage/v1/object/public/galeriacomercios/waze.jpg"
                 alt="Waze" class="shadow-[0px_9px_12px_-7px_rgba(0,_0,_0,_0.3)] rounded-full h-10">
          </a>
        </div>
      </div>
    </section>

    <section id="descripcionSection" class="px-6 mt-4">
      <div class="bg-white rounded-lg shadow-sm p-5">
        <h3 id="descripcionEventoTitulo" class="text-center text-2xl font-semibold text-[#232f43] mb-3"></h3>
        <p id="descripcionEvento" class="text-sm text-justify whitespace-pre-line overflow-hidden line-clamp-6 transition-all duration-500 ease-in-out"></p>
        <div class="text-center mt-3">
          <button id="toggleDescripcionEvento" class="text-lg text-gray-500 font-medium underline">Ver toda la información</button>
        </div>
      </div>
    </section>

    <section id="proximasFechasSection" class="px-4 mt-4">
      <div class="rounded-xl border border-slate-200 bg-white px-4 py-3">
        <h2 class="text-center text-lg font-semibold text-[#232f43]">Próximas fechas</h2>
        <ul id="listaFechasEvento" class="mt-3 space-y-2 text-sm text-slate-700"></ul>
        <div class="mt-3 text-center">
          <button id="toggleFechasEvento" type="button" class="hidden text-sm text-slate-600 underline underline-offset-2 hover:text-slate-800">
            Ver todas las fechas
          </button>
        </div>
      </div>
    </section>

    <section id="cercanosComidaContainer" class="hidden mt-8 w-full">
      <h2 class="text-lg font-medium mb-4 px-4 text-center">
        <span data-i18n="perfilComercio.cercanosComida">Lugares para Comer a menos de 10 minutos de</span>
        <span id="nombreCercanosComida" class="text-primary"></span>
      </h2>
      <div id="sliderCercanosComida" class="swiper cercanosSwiper w-full">
        <div class="swiper-wrapper"></div>
      </div>
    </section>

    <section id="cercanosLugaresContainer" class="hidden mt-8 w-full">
      <h2 class="text-lg font-medium mb-4 px-4 text-center">
        <span data-i18n="perfilComercio.cercanosLugares">Lugares de interés cerca de</span>
        <span id="nombreCercanosLugares" class="text-primary"></span>
      </h2>
      <div id="sliderCercanosLugares" class="swiper lugaresSwiper w-full">
        <div class="swiper-wrapper"></div>
      </div>
    </section>

    <div id="loader" class="fixed inset-0 bg-black/40 hidden items-center justify-center z-50">
      <img src="https://zgjaxanqfkweslkxtayt.supabase.co/storage/v1/object/public/findixi/loader.png" alt="Cargando información" class="w-16 h-16 animate-spin">
    </div>

    <div id="footerContainer" class="mt-8"></div>
    <script type="module" src="js/footer.js"></script>

    <script type="module" src="./js/perfilEvento.js"></script>
    <script src="js/bloquearPantalla.js"></script>
  </div>
</div>

<script>
  document.addEventListener('DOMContentLoaded', () => { if (window.initI18n) window.initI18n(); });
</script>
<script type="module" src="js/introSplash.js"></script>
<script type="module" src="js/betaBanner.js"></script>
</body>
</html>
